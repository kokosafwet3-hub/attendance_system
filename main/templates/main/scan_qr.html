{% extends 'main/base.html' %}

{% block title %}مسح QR{% endblock %}

{% block header_buttons %}
<a href="{% url 'student_home' %}" class="nav-btn">Home</a>
<a href="{% url 'logout' %}" class="nav-btn">Logout</a>
{% endblock %}

{% block content %}

<div class="scan-qr-page">
    <h2>امسح الـ QR</h2>
    <div id="reader"></div>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script>
    let scanned = false;

    const html5QrCode = new Html5Qrcode("reader");

    html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        (decodedText) => {
            if (scanned) return;
            scanned = true;
            html5QrCode.stop().then(() => {
                window.location.href = decodedText;
            }).catch(() => {
                window.location.href = decodedText;
            });
        }
    );
</script>

{% endblock %}
