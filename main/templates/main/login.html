{% extends 'main/base.html' %}

{% block title %}تسجيل الدخول{% endblock %}

{% block content %}

<div class="login-wrapper">
    
    {% if messages %}
        {% for message in messages %}
            <div class="error">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="login-box">
            <h2>Login</h2>

            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}

            <div class="input-group">
                <input type="text" name="username" placeholder="Username" required>
            </div>

            <div class="input-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <button class="login-btn" type="submit">Login</button>
        </div>

        <div class="roles">
            <h3>Select Role</h3>
            <div class="roles-container">

                <label class="role-item" onclick="selectRole(this)">
                    <input type="radio" name="role" value="admin">
                    <span class="arrow">🛡️</span>
                    Admin
                </label>

                <label class="role-item" onclick="selectRole(this)">
                    <input type="radio" name="role" value="doctor">
                    <span class="arrow">👨‍🏫</span>
                    Doctor
                </label>

                <label class="role-item" onclick="selectRole(this)">
                    <input type="radio" name="role" value="student">
                    <span class="arrow">🎓</span>
                    Student
                </label>

            </div>
        </div>
    </form>

</div>

<!-- زر الأسئلة الشائعة ثابت أسفل اليمين -->
<div style="position: fixed; bottom: 20px; right: 20px;">
    <a href="{% url 'faq' %}" class="btn-faq"> الأسئلة الشائعة</a>
</div>

<script>
    function selectRole(element) {
        document.querySelectorAll('.role-item').forEach(el => el.classList.remove('selected'));
        element.classList.add('selected');
        element.querySelector('input').checked = true;
    }
</script>

{% endblock %}
